<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩好心情之旅 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'soft-pink': '#FFC2D1',
                        'soft-blue': '#BDE0FE',
                        'soft-yellow': '#FFF1A7',
                        'cute-purple': '#CDB4DB',
                        'charcoal': '#4A4A4A'
                    },
                    borderRadius: {
                        'xl-cute': '2rem',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFF9F9; color: #4A4A4A; }
        .font-cartoon { font-family: 'ZCOOL KuaiLe', cursive; }
        .nav-active { color: #FF85A1; transform: scale(1.1); }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 2px solid #FFFFFF; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        /* 隱藏捲軸但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 text-center">
        <h1 class="text-3xl font-cartoon text-soft-pink drop-shadow-sm">沖繩好心情 🌸 Okinawa</h1>
        <p class="text-xs text-gray-400 mt-1">3/21 - 3/25 Fun Trip</p>
    </header>

    <main id="app-content" class="px-4 space-y-6">
        </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-pink-100 flex justify-around items-center py-3 safe-area-bottom z-50 rounded-t-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('plan')" class="nav-btn flex flex-col items-center space-y-1" id="btn-plan">
            <i class="fas fa-map-marked-alt text-xl"></i>
            <span class="text-[10px] font-bold">行程</span>
        </button>
        <button onclick="switchTab('guide')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-guide">
            <i class="fas fa-book-open text-xl"></i>
            <span class="text-[10px] font-bold">導覽</span>
        </button>
        <button onclick="switchTab('wallet')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-wallet">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[10px] font-bold">記帳</span>
        </button>
        <button onclick="switchTab('lists')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-lists">
            <i class="fas fa-check-square text-xl"></i>
            <span class="text-[10px] font-bold">清單</span>
        </button>
        <button onclick="switchTab('info')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-info">
            <i class="fas fa-info-circle text-xl"></i>
            <span class="text-[10px] font-bold">資訊</span>
        </button>
    </nav>

    <script id="tpl-plan" type="text/template">
        <div class="space-y-4 animate-fadeIn">
            <div class="bg-soft-blue/30 p-4 rounded-xl-cute border-2 border-dashed border-soft-blue">
                <h3 class="font-bold text-blue-600 mb-2"><i class="fas fa-plane"></i> 航班快訊</h3>
                <div class="grid grid-cols-2 gap-2 text-sm">
                    <div class="bg-white p-2 rounded-lg shadow-sm">
                        <p class="font-bold text-pink-500">去程 OD 882</p>
                        <p>TPE 13:10 → OKA 15:30</p>
                    </div>
                    <div class="bg-white p-2 rounded-lg shadow-sm">
                        <p class="font-bold text-pink-500">回程 OD 883</p>
                        <p>OKA 16:30 → TPE 17:15</p>
                    </div>
                </div>
            </div>

            <div class="space-y-8 relative before:absolute before:inset-0 before:left-4 before:h-full before:w-0.5 before:bg-pink-100">
                <div class="relative pl-10">
                    <div class="absolute left-1 top-0 w-6 h-6 bg-pink-400 rounded-full flex items-center justify-center text-white text-xs border-4 border-white shadow-sm">1</div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50">
                        <h4 class="font-bold text-pink-500 mb-2">3/21 (Sat) 出發沖繩</h4>
                        <ul class="text-sm space-y-3">
                            <li class="bg-yellow-50 p-2 rounded-lg border-l-4 border-yellow-400">
                                <span class="font-bold text-xs block text-gray-400">11:00</span>
                                桃園機場集合 (13:10起飛)
                            </li>
                            <li><span class="font-bold">15:30</span> 抵達那霸 ➔ BGA租車</li>
                            <li>美國村 (三麗鷗店買 Kitty 🎀)</li>
                            <li><span class="text-pink-600 font-bold">20:00</span> 日落大道煙火</li>
                        </ul>
                        <div class="mt-4 pt-4 border-t border-gray-100 flex justify-between items-center">
                            <span class="text-xs text-gray-400"><i class="fas fa-hotel"></i> 還元ホテル 名護大宮</span>
                            <a href="https://maps.app.goo.gl/3fR9" class="text-[10px] bg-soft-pink px-3 py-1 rounded-full text-white">開啟地圖</a>
                        </div>
                    </div>
                </div>
                <div class="relative pl-10">
                    <div class="absolute left-1 top-0 w-6 h-6 bg-pink-400 rounded-full flex items-center justify-center text-white text-xs border-4 border-white shadow-sm">2</div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50">
                        <h4 class="font-bold text-pink-500 mb-2">3/22 (Sun) 海洋與購物</h4>
                        <ul class="text-sm space-y-2">
                            <li>早餐：Potama 飯糰 🍙</li>
                            <li>美麗海水族館 🐬</li>
                            <li>古宇利島 (愛心石 ❤️)</li>
                            <li>Yakiniku Kochan 燒肉</li>
                            <li>MEGA 唐吉訶德 名護店</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </script>

    <script id="tpl-wallet" type="text/template">
        <div class="space-y-4 animate-fadeIn">
            <div class="bg-cute-purple/20 p-5 rounded-xl-cute border-2 border-cute-purple">
                <h3 class="font-cartoon text-lg mb-3">🧮 聰明算錢錢</h3>
                <div class="space-y-3">
                    <input id="calc-input" type="text" placeholder="輸入算式 如: 500+200*3" class="w-full p-3 rounded-2xl border-none shadow-inner focus:ring-2 focus:ring-cute-purple outline-none">
                    <div class="flex gap-2">
                        <input id="exchange-rate" type="number" value="0.21" step="0.001" class="w-24 p-2 rounded-xl text-center text-sm border-none shadow-inner">
                        <button onclick="calculateExchange()" class="flex-1 bg-cute-purple text-white font-bold rounded-xl py-2 shadow-md active:scale-95 transition-transform">計算回台幣</button>
                    </div>
                    <div id="calc-result" class="text-center text-2xl font-cartoon text-cute-purple py-2">NT$ 0</div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl-cute shadow-sm border border-gray-100 space-y-3">
                <input id="item-name" type="text" placeholder="品項 (如: 飯糰)" class="w-full p-2 border-b focus:outline-none">
                <input id="item-jpy" type="number" placeholder="日幣金額" class="w-full p-2 border-b focus:outline-none">
                <div class="flex items-center space-x-2">
                    <label class="flex-1 cursor-pointer bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl p-2 text-center text-xs text-gray-500">
                        <i class="fas fa-camera"></i> 拍收據
                        <input type="file" id="item-photo" accept="image/*" class="hidden" onchange="previewImage(this)">
                    </label>
                    <button onclick="addRecord()" class="flex-1 bg-soft-pink text-white font-bold py-2 rounded-xl">新增紀錄</button>
                </div>
                <div id="photo-preview-container" class="hidden">
                   <img id="photo-preview" src="" class="h-20 w-20 object-cover rounded-lg">
                </div>
            </div>

            <div id="record-list" class="space-y-3">
                </div>
        </div>
    </script>

    <script id="tpl-lists" type="text/template">
        <div class="space-y-6 animate-fadeIn">
            <div class="bg-white p-5 rounded-xl-cute shadow-sm">
                <h3 class="font-cartoon text-lg mb-4 text-pink-400"><i class="fas fa-clipboard-list"></i> 行前檢查</h3>
                <div id="checklist-container" class="grid grid-cols-2 gap-3">
                    </div>
            </div>

            <div class="bg-white p-5 rounded-xl-cute shadow-sm">
                <h3 class="font-cartoon text-lg mb-4 text-blue-400"><i class="fas fa-sticky-note"></i> 個人備忘錄</h3>
                <textarea id="memo-input" placeholder="貼上網址或紀錄隨筆..." class="w-full h-32 p-3 bg-blue-50/50 rounded-2xl border-none focus:ring-2 focus:ring-soft-blue outline-none text-sm"></textarea>
                <button onclick="saveMemo()" class="w-full mt-2 bg-soft-blue text-white font-bold py-2 rounded-xl shadow-sm">儲存備忘錄</button>
                <div id="memo-display" class="mt-4 space-y-2"></div>
            </div>
        </div>
    </script>

    <script id="tpl-guide" type="text/template">
        <div class="space-y-4 animate-fadeIn">
            <div class="bg-white rounded-xl-cute shadow-sm overflow-hidden">
                <div class="bg-soft-blue p-4 text-white font-cartoon text-xl text-center">美麗海水族館攻略</div>
                <div class="p-4 text-sm leading-relaxed space-y-3">
                    <p>💡 **亮點**：擁有世界第三大的水槽「黑潮之海」，可以看到巨大的鯨鯊與鬼蝠魟！</p>
                    <iframe class="w-full h-48 rounded-xl border-none" src="https://www.openstreetmap.org/export/embed.html?bbox=127.8745,26.6912,127.8805,26.6962&layer=mapnik"></iframe>
                    <p>🕒 **建議停留**：3小時。記得看戶外的海豚表演（免費）。</p>
                </div>
            </div>
            <div class="bg-white rounded-xl-cute shadow-sm overflow-hidden">
                <div class="bg-soft-pink p-4 text-white font-cartoon text-xl text-center">古宇利島愛心石</div>
                <div class="p-4 text-sm leading-relaxed space-y-2">
                    <p>嵐（ARASHI）拍廣告而聞名的景點。退潮時心形會更明顯喔！海灘路徑稍窄，建議穿好走的鞋子。</p>
                </div>
            </div>
        </div>
    </script>

    <script id="tpl-info" type="text/template">
        <div class="space-y-4 animate-fadeIn">
            <div class="grid grid-cols-2 gap-4 text-center">
                <a href="https://www.jma.go.jp/bosai/forecast/#area_code=471000" target="_blank" class="bg-white p-4 rounded-xl-cute shadow-sm border border-orange-100">
                    <i class="fas fa-sun text-orange-400 text-2xl mb-2"></i>
                    <p class="text-xs font-bold">天氣預報</p>
                </a>
                <div class="bg-white p-4 rounded-xl-cute shadow-sm border border-red-100">
                    <i class="fas fa-phone-alt text-red-400 text-2xl mb-2"></i>
                    <p class="text-xs font-bold">緊急 110 / 119</p>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl-cute shadow-sm">
                <h3 class="font-bold text-red-500 mb-3"><i class="fas fa-exclamation-triangle"></i> 旅遊禁忌與注意</h3>
                <ul class="text-xs space-y-2 text-gray-600 list-disc pl-4">
                    <li>禁止攜帶肉製品、新鮮蔬果回台灣（罰款極重！）。</li>
                    <li>日本開車左側通行，注意導航指示。</li>
                    <li>許多小店僅收現鈔，日幣務必帶足。</li>
                    <li>退稅請備妥護照正本。</li>
                </ul>
            </div>
        </div>
    </script>

    <script>
        const app = {
            currentTab: 'plan',
            db: JSON.parse(localStorage.getItem('tripData')) || {
                records: [],
                memo: '',
                checks: ['護照', '網卡', '日文譯本', '台灣駕照', '日幣現鈔', '信用卡', '換洗衣物', '個人藥物']
            },
            photoTemp: null
        };

        function switchTab(tabId) {
            app.currentTab = tabId;
            const content = document.getElementById('app-content');
            const template = document.getElementById(`tpl-${tabId}`).innerHTML;
            content.innerHTML = template;

            // Update Nav UI
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-gray-400'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            document.getElementById(`btn-${tabId}`).classList.remove('text-gray-400');
            document.getElementById(`btn-${tabId}`).classList.add('nav-active');

            // Tab specific init
            if(tabId === 'wallet') renderRecords();
            if(tabId === 'lists') { renderChecklist(); renderMemo(); }
        }

        // Wallet Functions
        function calculateExchange() {
            const input = document.getElementById('calc-input').value;
            const rate = document.getElementById('exchange-rate').value;
            try {
                // Simple math parser using Function constructor (safe for math only)
                const sanitized = input.replace(/[^-+*/.0-9]/g, '');
                const jpy = new Function(`return ${sanitized}`)();
                const twd = Math.round(jpy * rate);
                document.getElementById('calc-result').innerText = `NT$ ${twd.toLocaleString()}`;
            } catch (e) {
                alert('請輸入正確的算式喔！');
            }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = 200 / img.width;
                        canvas.width = 200;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        app.photoTemp = canvas.toDataURL('image/jpeg', 0.7);
                        document.getElementById('photo-preview-container').classList.remove('hidden');
                        document.getElementById('photo-preview').src = app.photoTemp;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addRecord() {
            const name = document.getElementById('item-name').value;
            const jpy = document.getElementById('item-jpy').value;
            const rate = 0.21; // 固定或從 UI 取
            if(!name || !jpy) return alert('請填寫品項與金額');

            app.db.records.unshift({
                id: Date.now(),
                name,
                jpy,
                twd: Math.round(jpy * rate),
                photo: app.photoTemp
            });
            saveDB();
            app.photoTemp = null;
            renderRecords();
            // Reset fields
            document.getElementById('item-name').value = '';
            document.getElementById('item-jpy').value = '';
            document.getElementById('photo-preview-container').classList.add('hidden');
        }

        function renderRecords() {
            const list = document.getElementById('record-list');
            if(!list) return;
            list.innerHTML = app.db.records.map(r => `
                <div class="flex items-center bg-white p-3 rounded-2xl shadow-sm space-x-3">
                    ${r.photo ? `<img src="${r.photo}" class="w-12 h-12 rounded-lg object-cover">` : `<div class="w-12 h-12 bg-pink-50 rounded-lg flex items-center justify-center text-pink-200"><i class="fas fa-utensils"></i></div>`}
                    <div class="flex-1">
                        <p class="font-bold text-sm">${r.name}</p>
                        <p class="text-[10px] text-gray-400">¥${r.jpy} → NT$${r.twd}</p>
                    </div>
                    <button onclick="deleteRecord(${r.id})" class="text-gray-300 hover:text-red-400"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        function deleteRecord(id) {
            app.db.records = app.db.records.filter(r => r.id !== id);
            saveDB();
            renderRecords();
        }

        // Checklist & Memo
        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            const items = ['護照', '網卡', '日文譯本', '台灣駕照', '日幣現鈔', '信用卡', '換洗衣物', '個人藥物'];
            container.innerHTML = items.map(item => `
                <label class="flex items-center space-x-2 text-sm bg-pink-50/50 p-2 rounded-xl">
                    <input type="checkbox" class="accent-pink-400 h-4 w-4">
                    <span>${item}</span>
                </label>
            `).join('');
        }

        function saveMemo() {
            app.db.memo = document.getElementById('memo-input').value;
            saveDB();
            renderMemo();
        }

        function renderMemo() {
            const display = document.getElementById('memo-display');
            const input = document.getElementById('memo-input');
            if(input) input.value = app.db.memo;
            
            // URL Parser
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const content = app.db.memo.replace(urlRegex, (url) => {
                return `<a href="${url}" target="_blank" class="inline-block bg-soft-blue text-white px-3 py-1 rounded-full text-[10px] m-1"><i class="fas fa-link"></i> 開啟連結</a>`;
            });
            display.innerHTML = `<div class="text-sm whitespace-pre-wrap text-gray-600">${content}</div>`;
        }

        function saveDB() {
            localStorage.setItem('tripData', JSON.stringify(app.db));
        }

        // Init
        window.onload = () => switchTab('plan');
    </script>
</body>
</html>
