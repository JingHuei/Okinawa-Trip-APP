<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩好心情之旅 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'soft-pink': '#FFC2D1', 'soft-blue': '#BDE0FE', 'soft-yellow': '#FFF1A7', 'cute-purple': '#CDB4DB'
                    },
                    borderRadius: { 'xl-cute': '2rem' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFF9F9; color: #4A4A4A; overflow-x: hidden; }
        .font-cartoon { font-family: 'ZCOOL KuaiLe', cursive; }
        .nav-active { color: #FF85A1; transform: scale(1.1); }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 2px solid #FFFFFF; }
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 text-center">
        <h1 class="text-3xl font-cartoon text-soft-pink drop-shadow-sm">沖繩好心情 🌸 Okinawa</h1>
        <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest italic">3/21 - 3/25 Fun Trip</p>
    </header>

    <main id="app-content" class="px-4 space-y-6"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-pink-100 flex justify-around items-center py-3 safe-area-bottom z-50 rounded-t-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('plan')" class="nav-btn flex flex-col items-center space-y-1" id="btn-plan"><i class="fas fa-map-marked-alt text-xl"></i><span class="text-[10px] font-bold">行程</span></button>
        <button onclick="switchTab('guide')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-guide"><i class="fas fa-book-open text-xl"></i><span class="text-[10px] font-bold">導覽</span></button>
        <button onclick="switchTab('wallet')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-wallet"><i class="fas fa-wallet text-xl"></i><span class="text-[10px] font-bold">記帳</span></button>
        <button onclick="switchTab('lists')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-lists"><i class="fas fa-check-square text-xl"></i><span class="text-[10px] font-bold">清單</span></button>
        <button onclick="switchTab('info')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-info"><i class="fas fa-info-circle text-xl"></i><span class="text-[10px] font-bold">資訊</span></button>
    </nav>

    <script id="tpl-plan" type="text/template">
        <div class="space-y-4 animate-fadeIn pb-10">
            <div class="bg-soft-blue/30 p-4 rounded-xl-cute border-2 border-dashed border-soft-blue text-[11px]">
                <h3 class="font-bold text-blue-600 mb-2"><i class="fas fa-plane"></i> 航班資訊</h3>
                <div class="grid grid-cols-2 gap-2 text-gray-600">
                    <div class="bg-white p-2 rounded-lg border border-blue-100">🛫 3/21 13:10-15:30</div>
                    <div class="bg-white p-2 rounded-lg border border-blue-100">🛬 3/25 16:30-17:15</div>
                </div>
            </div>
            <div class="space-y-6 relative before:absolute before:inset-0 before:left-4 before:h-full before:w-0.5 before:bg-pink-100">
                <div class="relative pl-10"><div class="absolute left-1 top-0 w-6 h-6 bg-pink-400 rounded-full flex items-center justify-center text-white text-[10px] border-4 border-white shadow-sm font-bold">1</div><div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50"><h4 class="font-bold text-pink-500 mb-1">3/21 出發</h4><ul class="text-xs space-y-1 text-gray-500"><li>📍 11:00 桃機集合</li><li>📍 15:30 抵達那霸</li><li>📍 17:30 美國村煙火</li></ul></div></div>
                <div class="relative pl-10"><div class="absolute left-1 top-0 w-6 h-6 bg-pink-400 rounded-full flex items-center justify-center text-white text-[10px] border-4 border-white shadow-sm font-bold">2</div><div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50"><h4 class="font-bold text-pink-500 mb-1">3/22 海洋</h4><ul class="text-xs space-y-1 text-gray-500"><li>📍 美麗海水族館</li><li>📍 古宇利島</li><li>📍 Yakiniku 燒肉</li></ul></div></div>
                <div class="relative pl-10"><div class="absolute left-1 top-0 w-6 h-6 bg-pink-400 rounded-full flex items-center justify-center text-white text-[10px] border-4 border-white shadow-sm font-bold">3</div><div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50"><h4 class="font-bold text-pink-500 mb-1">3/23 逛街</h4><ul class="text-xs space-y-1 text-gray-500"><li>📍 Parco City (吉依卡哇)</li><li>📍 波上宮參拜</li></ul></div></div>
                <div class="relative pl-10"><div class="absolute left-1 top-0 w-6 h-6 bg-pink-400 rounded-full flex items-center justify-center text-white text-[10px] border-4 border-white shadow-sm font-bold">4</div><div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50"><h4 class="font-bold text-pink-500 mb-1">3/24 南部</h4><ul class="text-xs space-y-1 text-gray-500"><li>📍 瀨長島飛機</li><li>📍 玉泉洞</li><li>📍 19:00 還車</li></ul></div></div>
                <div class="relative pl-10"><div class="absolute left-1 top-0 w-6 h-6 bg-pink-400 rounded-full flex items-center justify-center text-white text-[10px] border-4 border-white shadow-sm font-bold">5</div><div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50"><h4 class="font-bold text-pink-500 mb-1">3/25 回程</h4><ul class="text-xs space-y-1 text-gray-500"><li>📍 牧志市場補貨</li><li>📍 17:15 抵台</li></ul></div></div>
            </div>
        </div>
    </script>

    <script id="tpl-guide" type="text/template">
        <div class="space-y-6 animate-fadeIn pb-10">
            <div class="bg-white rounded-xl-cute shadow-sm overflow-hidden border border-pink-100">
                <div class="bg-soft-blue p-4 text-white font-cartoon text-xl text-center">美麗海水族館 🐬</div>
                <div class="p-4 text-xs text-gray-600 space-y-2">
                    <p>💡 15:00/17:00 有鯨鯊餵食秀。</p>
                    <a href="https://www.google.com/maps/search/?api=1&query=目的地名稱`。這種寫法會讓手機自動尋找對應的地標。1" target="_blank" class="block w-full text-center bg-blue-50 text-blue-500 py-2 rounded-lg">開啟導航</a>
                </div>
            </div>
            <div class="bg-white rounded-xl-cute shadow-sm overflow-hidden border border-pink-100">
                <div class="bg-cute-purple p-4 text-white font-cartoon text-xl text-center">玉泉洞 🕳️</div>
                <div class="p-4 text-xs text-gray-600"><p>地面濕滑，建議穿止滑鞋！日本最大規模鐘乳石洞。</p></div>
            </div>
        </div>
    </script>

    <script id="tpl-wallet" type="text/template">
        <div class="space-y-4 animate-fadeIn pb-10">
            <div class="bg-gradient-to-br from-cute-purple to-soft-blue p-5 rounded-xl-cute text-white shadow-lg">
                <p class="text-[10px] opacity-80 uppercase tracking-widest">Total Expense / 累計支出</p>
                <div class="flex justify-between items-end mt-2">
                    <div><span class="text-2xl font-cartoon" id="total-jpy">¥ 0</span></div>
                    <div class="text-right text-sm opacity-90 font-bold" id="total-twd">NT$ 0</div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl-cute shadow-sm border border-gray-50 space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input id="item-name" type="text" placeholder="項目" class="p-2 border-b text-sm focus:outline-none focus:border-soft-pink">
                    <input id="item-jpy" type="number" placeholder="金額 (日幣)" class="p-2 border-b text-sm focus:outline-none focus:border-soft-pink">
                </div>
                <div class="flex items-center space-x-2">
                    <div class="flex-1 text-[10px] text-gray-400">匯率預設: 0.21</div>
                    <button onclick="addRecord()" class="bg-soft-pink text-white font-bold px-6 py-2 rounded-xl shadow-sm active:scale-95 transition-transform">新增</button>
                </div>
            </div>

            <div id="record-list" class="space-y-2"></div>
        </div>
    </script>

    <script id="tpl-lists" type="text/template">
        <div class="space-y-6 animate-fadeIn pb-10">
            <div class="bg-white p-5 rounded-xl-cute shadow-sm border border-pink-50">
                <h3 class="font-cartoon text-lg mb-4 text-pink-400"><i class="fas fa-clipboard-check"></i> 行前檢查</h3>
                <div id="checklist-container" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div class="bg-white p-5 rounded-xl-cute shadow-sm border border-blue-50">
                <h3 class="font-cartoon text-lg mb-4 text-blue-400"><i class="fas fa-edit"></i> 旅遊待辦/備忘</h3>
                <div class="flex flex-col space-y-2">
                    <textarea id="memo-input" placeholder="記下想買的清單或行程細節..." class="w-full h-24 p-3 bg-blue-50/30 rounded-2xl border-none focus:ring-2 focus:ring-soft-blue outline-none text-sm"></textarea>
                    <button onclick="saveMemo()" class="w-full bg-soft-blue text-white font-bold py-3 rounded-xl shadow-sm">新增備忘</button>
                </div>
                <div id="memo-display" class="mt-6 space-y-3"></div>
            </div>
        </div>
    </script>

    <script id="tpl-info" type="text/template">
        <div class="p-4 bg-white rounded-xl-cute shadow-sm border border-orange-50 animate-fadeIn">
            <h3 class="font-bold text-orange-500 mb-2">💡 旅人小提醒</h3>
            <ul class="text-xs space-y-2 text-gray-500 list-disc pl-4">
                <li>日本全面禁止帶肉製品回台。</li>
                <li>轉彎請記得「左小右大」。</li>
            </ul>
        </div>
    </script>

    <script>
        const app = {
            currentTab: 'plan',
            db: JSON.parse(localStorage.getItem('tripData_v4')) || {
                records: [],
                memos: [],
                checkStatus: {}
            }
        };

        function switchTab(tabId) {
            app.currentTab = tabId;
            document.getElementById('app-content').innerHTML = document.getElementById(`tpl-${tabId}`).innerHTML;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-gray-400'), btn => btn.classList.remove('nav-active'));
            const activeBtn = document.getElementById(`btn-${tabId}`);
            if(activeBtn) { activeBtn.classList.remove('text-gray-400'); activeBtn.classList.add('nav-active'); }

            if(tabId === 'wallet') renderRecords();
            if(tabId === 'lists') { renderChecklist(); renderMemoList(); }
            window.scrollTo(0, 0);
        }

        // --- 記帳邏輯 (自動累計) ---
        function addRecord() {
            const name = document.getElementById('item-name').value;
            const jpy = parseFloat(document.getElementById('item-jpy').value);
            if(!name || isNaN(jpy)) return;

            app.db.records.unshift({ id: Date.now(), name, jpy, twd: Math.round(jpy * 0.21) });
            saveDB();
            renderRecords();
            
            // 清空輸入
            document.getElementById('item-name').value = '';
            document.getElementById('item-jpy').value = '';
        }

        function renderRecords() {
            const list = document.getElementById('record-list');
            if(!list) return;

            let totalJPY = 0;
            let totalTWD = 0;

            list.innerHTML = app.db.records.map(r => {
                totalJPY += r.jpy;
                totalTWD += r.twd;
                return `
                    <div class="flex justify-between items-center bg-white p-3 rounded-2xl border border-gray-100 animate-fadeIn">
                        <div>
                            <p class="text-sm font-bold text-gray-700">${r.name}</p>
                            <p class="text-[10px] text-gray-400">¥${r.jpy.toLocaleString()} → NT$${r.twd.toLocaleString()}</p>
                        </div>
                        <button onclick="deleteRecord(${r.id})" class="text-gray-300"><i class="fas fa-minus-circle"></i></button>
                    </div>
                `;
            }).join('');

            // 更新總額顯示
            document.getElementById('total-jpy').innerText = `¥ ${totalJPY.toLocaleString()}`;
            document.getElementById('total-twd').innerText = `NT$ ${totalTWD.toLocaleString()}`;
        }

        function deleteRecord(id) {
            app.db.records = app.db.records.filter(r => r.id !== id);
            saveDB(); renderRecords();
        }

        // --- 備忘錄邏輯 (修正待辦+清空) ---
        function saveMemo() {
            const input = document.getElementById('memo-input');
            const content = input.value.trim();
            if(!content) return;
            app.db.memos.unshift({ id: Date.now(), text: content, completed: false });
            saveDB();
            input.value = ''; // 清空
            renderMemoList();
        }

        function toggleMemo(id) {
            const m = app.db.memos.find(memo => memo.id === id);
            if(m) { m.completed = !m.completed; saveDB(); renderMemoList(); }
        }

        function deleteMemo(id) {
            app.db.memos = app.db.memos.filter(m => m.id !== id);
            saveDB(); renderMemoList();
        }

        function renderMemoList() {
            const display = document.getElementById('memo-display');
            if(!display) return;
            const urlRegex = /(https?:\/\/[^\s]+)/g;

            display.innerHTML = app.db.memos.map(m => {
                const textWithLinks = m.text.replace(urlRegex, (url) => `<br><a href="${url}" target="_blank" class="inline-block bg-soft-blue text-white px-3 py-1 rounded-full text-[9px] mt-1 italic"><i class="fas fa-link"></i> 開啟連結</a>`);
                return `
                    <div class="flex items-start bg-gray-50/50 p-3 rounded-2xl border border-gray-100 animate-fadeIn">
                        <input type="checkbox" onchange="toggleMemo(${m.id})" ${m.completed ? 'checked' : ''} class="mt-1 accent-soft-blue h-4 w-4">
                        <div class="flex-1 ml-3 text-sm ${m.completed ? 'line-through text-gray-300' : 'text-gray-600'} break-all">
                            ${textWithLinks}
                        </div>
                        <button onclick="deleteMemo(${m.id})" class="ml-2 text-gray-300 hover:text-red-400"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>
                `;
            }).join('');
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            const items = ['護照', '網卡/Wi-Fi', '日文譯本', '台灣駕照', '日幣現鈔', '信用卡', '換洗衣物', '行動電源'];
            container.innerHTML = items.map(item => `
                <label class="flex items-center space-x-2 text-xs bg-pink-50/30 p-2 rounded-xl border border-pink-100/50">
                    <input type="checkbox" onchange="toggleCheckStatus('${item}')" ${app.db.checkStatus[item] ? 'checked' : ''} class="accent-pink-400">
                    <span class="${app.db.checkStatus[item] ? 'line-through text-gray-400' : ''}">${item}</span>
                </label>
            `).join('');
        }

        function toggleCheckStatus(item) { app.db.checkStatus[item] = !app.db.checkStatus[item]; saveDB(); renderChecklist(); }
        function saveDB() { localStorage.setItem('tripData_v4', JSON.stringify(app.db)); }
        window.onload = () => switchTab('plan');
    </script>
</body>
</html>
