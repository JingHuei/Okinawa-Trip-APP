<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩好心情之旅 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'soft-pink': '#FFC2D1',
                        'soft-blue': '#BDE0FE',
                        'soft-yellow': '#FFF1A7',
                        'cute-purple': '#CDB4DB',
                        'charcoal': '#4A4A4A'
                    },
                    borderRadius: { 'xl-cute': '2rem' }
                }
            }
        }
    </script>

        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFF9F9; color: #4A4A4A; overflow-x: hidden; }
        .font-cartoon { font-family: 'ZCOOL KuaiLe', cursive; }
        .nav-active { color: #FF85A1; transform: scale(1.1); }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 2px solid #FFFFFF; }
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 text-center">
        <h1 class="text-3xl font-cartoon text-soft-pink drop-shadow-sm">沖繩好心情 🌸 Okinawa</h1>
        <p class="text-xs text-gray-400 mt-1 italic">3/21 - 3/25 Family Trip</p>
    </header>

    <main id="app-content" class="px-4 space-y-6"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-pink-100 flex justify-around items-center py-3 safe-area-bottom z-50 rounded-t-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('plan')" class="nav-btn flex flex-col items-center space-y-1" id="btn-plan"><i class="fas fa-map-marked-alt text-xl"></i><span class="text-[10px] font-bold">行程</span></button>
        <button onclick="switchTab('guide')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-guide"><i class="fas fa-book-open text-xl"></i><span class="text-[10px] font-bold">導覽</span></button>
        <button onclick="switchTab('wallet')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-wallet"><i class="fas fa-wallet text-xl"></i><span class="text-[10px] font-bold">記帳</span></button>
        <button onclick="switchTab('lists')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-lists"><i class="fas fa-check-square text-xl"></i><span class="text-[10px] font-bold">清單</span></button>
        <button onclick="switchTab('info')" class="nav-btn flex flex-col items-center space-y-1 text-gray-400" id="btn-info"><i class="fas fa-info-circle text-xl"></i><span class="text-[10px] font-bold">資訊</span></button>
    </nav>

        <div class="space-y-4 animate-fadeIn pb-10">
            <div class="bg-soft-blue/30 p-4 rounded-xl-cute border-2 border-dashed border-soft-blue">
                <h3 class="font-bold text-blue-600 mb-2"><i class="fas fa-plane"></i> 航班快訊</h3>
                <div class="grid grid-cols-2 gap-2 text-[11px]">
                    <div class="bg-white p-2 rounded-lg shadow-sm border border-blue-100">
                        <p class="font-bold text-pink-500 text-xs">🛫 去 OD 882</p>
                        <p class="font-medium text-gray-600">3/21 13:10-15:30</p>
                        <p class="text-[9px] text-gray-400">桃園 T1 → 那霸</p>
                    </div>
                    <div class="bg-white p-2 rounded-lg shadow-sm border border-blue-100">
                        <p class="font-bold text-pink-500 text-xs">🛬 回 OD 883</p>
                        <p class="font-medium text-gray-600">3/25 16:30-17:15</p>
                        <p class="text-[9px] text-gray-400">那霸 → 桃園 T1</p>
                    </div>
                </div>
            </div>

            <div class="space-y-6 relative before:absolute before:inset-0 before:left-4 before:h-full before:w-0.5 before:bg-pink-100">
                <div class="relative pl-10">
                    <div class="absolute left-1 top-0 w-6 h-6 bg-pink-400 rounded-full flex items-center justify-center text-white text-[10px] border-4 border-white shadow-sm font-bold">1</div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50">
                        <h4 class="font-bold text-pink-500 mb-2">3/21 (四) 出發沖繩</h4>
                        <ul class="text-sm space-y-2 text-gray-600">
                            <li>📍 <span class="font-bold text-orange-500">11:00</span> 桃園機場集合</li>
                            <li>📍 <span class="font-bold text-blue-500">15:30</span> 抵達那霸/入境</li>
                            <li>📍 <span class="font-bold">16:30</span> BGA 租車取車</li>
                            <li>📍 <span class="font-bold">17:30</span> 美國村 (Kitty 🎀)</li>
                            <li>📍 <span class="font-bold text-pink-600">20:00</span> 日落大道煙火</li>
                        </ul>
                        <div class="mt-4 pt-3 border-t border-dotted flex justify-between items-center text-[10px]">
                            <span class="text-gray-400"><i class="fas fa-bed"></i> 還元ホテル 名護大宮</span>
                            <a href="https://www.google.com/maps/search/?api=1&query=Genwan+Hotel+Nago+Omiya" target="_blank" class="bg-soft-pink px-3 py-1 rounded-full text-white">地圖</a>
                        </div>
                    </div>
                </div>

                <div class="relative pl-10">

                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50">

                            <li>📍 <span class="font-bold">08:30</span> Potama / A&W 早餐</li>
                            <li>📍 <span class="font-bold text-blue-500">10:00</span> 美麗海水族館 🐬</li>
                            <li>📍 <span class="font-bold text-green-600">14:30</span> 古宇利島 (跨海大橋)</li>

                            <a href="https://www.google.com/maps/search/?api=1&query=Hotel+Torifito+Naha+Asahibashi" target="_blank" class="bg-soft-pink px-3 py-1 rounded-full text-white shadow-sm">地圖</a>
                        </div>

                </div>

                <div class="relative pl-10">
                    <div class="absolute left-1 top-0 w-6 h-6 bg-pink-400 rounded-full flex items-center justify-center text-white text-[10px] border-4 border-white shadow-sm font-bold">4</div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-pink-50">
                        <h4 class="font-bold text-pink-500 mb-2">3/24 (日) 南部精選</h4>

                            <li>📍 <span class="font-bold">10:00</span> iias 沖繩豐崎</li>

                            <li>📍 <span class="font-bold text-green-600">16:30</span> 沖繩世界 (玉泉洞)</li>

                        <ul class="text-sm space-y-2 text-gray-600">
                            <li>📍 <span class="font-bold text-orange-400">09:00</span> 牧志市場補貨</li>

                            <li>📍 <span class="font-bold text-red-500">13:30</span> 搭車前往機場</li>

    <script id="tpl-guide" type="text/template">
        <div class="space-y-6 animate-fadeIn pb-10">
            <div class="bg-white rounded-xl-cute shadow-sm overflow-hidden border border-pink-100">
                <div class="bg-soft-blue p-4 text-white font-cartoon text-xl text-center">美麗海水族館 🐬</div>
                <div class="p-4 space-y-3">
                    <p class="text-sm text-gray-600 leading-relaxed">這座全球排名前三的水族館，最不能錯過「黑潮之海」大水槽。站在兩層樓高的壓克力牆前看著巨型鯨鯊游過，非常震撼！</p>
                    <ul class="text-xs space-y-1 text-blue-500 bg-blue-50 p-2 rounded-lg">
                        <li>💡 密技：15:00 與 17:00 有鯨鯊餵食秀。</li>
                        <li>🎭 戶外區有「海豚劇場」表演(免費看)。</li>
                    </ul>
                    <iframe class="w-full h-40 rounded-xl" src="https://www.openstreetmap.org/export/embed.html?bbox=127.874,26.691,127.880,26.696&layer=mapnik"></iframe>
                </div>
            </div>

            <div class="bg-white rounded-xl-cute shadow-sm overflow-hidden border border-pink-100">
                <div class="bg-soft-yellow p-4 text-orange-600 font-cartoon text-xl text-center">古宇利島 ❤️</div>
                <div class="p-4 space-y-2 text-sm text-gray-600">
                    <p>穿越超美的跨海大橋抵達。島上有著名的「愛心石」礁岩。建議在休息站買一份紅芋塔，邊吹海風邊吃。</p>
                    <p class="text-[11px] bg-yellow-50 p-2 rounded text-orange-700 italic">開車導航請設定「古宇利大橋」方能體驗在海上馳騁的快感。</p>
                </div>
            </div>

            <div class="bg-white rounded-xl-cute shadow-sm overflow-hidden border border-pink-100">
                <div class="bg-cute-purple p-4 text-white font-cartoon text-xl text-center">玉泉洞 (沖繩世界)</div>
                <div class="p-4 space-y-3 text-sm text-gray-600">
                    <p>全長 5 公里的鐘乳石洞（開放約 890 米），是日本規模最大的鐘乳石景觀，洞內氣溫終年恆溫約 21 度，冬暖夏涼。</p>
                    <p class="text-xs bg-purple-50 p-2 rounded text-purple-700">⚠️ 洞內地面濕滑且有階梯，建議穿著防滑平底鞋。</p>
                </div>
            </div>

            <div class="bg-white rounded-xl-cute shadow-sm overflow-hidden border border-pink-100">
                <div class="bg-soft-pink p-4 text-white font-cartoon text-xl text-center">國際通/牧志市場</div>
                <div class="p-4 space-y-2 text-sm text-gray-600">
                    <p>沖繩最熱鬧的購物街。買伴手禮、泡盛酒、風獅爺裝飾都在這。後方的牧志市場則可以吃到最新鮮的海產與生魚片。</p>
                    <p class="font-bold text-pink-500 text-xs">推薦：Lawson 的烤布丁、Calbee 現炸薯條。</p>
                </div>
            </div>
        </div>
    </script>

    <script id="tpl-wallet" type="text/template">
        <div class="space-y-4 animate-fadeIn">
            <div class="bg-cute-purple/20 p-5 rounded-xl-cute border-2 border-cute-purple">
                <h3 class="font-cartoon text-lg mb-3">🧮 快速換算</h3>
                <div class="space-y-3">
                    <input id="calc-input" type="text" placeholder="輸入算式 (如 1200+500)" class="w-full p-3 rounded-2xl border-none shadow-inner focus:ring-2 focus:ring-cute-purple outline-none">
                    <div class="flex gap-2">
                        <input id="exchange-rate" type="number" value="0.21" step="0.001" class="w-24 p-2 rounded-xl text-center text-sm border-none shadow-inner">
                        <button onclick="calculateExchange()" class="flex-1 bg-cute-purple text-white font-bold rounded-xl py-2 shadow-md">換算台幣</button>
                    </div>
                    <div id="calc-result" class="text-center text-2xl font-cartoon text-cute-purple py-2">NT$ 0</div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl-cute shadow-sm border border-gray-100 space-y-3">
                <input id="item-name" type="text" placeholder="買了什麼？" class="w-full p-2 border-b focus:outline-none text-sm">
                <input id="item-jpy" type="number" placeholder="日幣金額" class="w-full p-2 border-b focus:outline-none text-sm">
                <div class="flex items-center space-x-2">
                    <label class="flex-1 cursor-pointer bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl p-2 text-center text-xs text-gray-400">
                        <i class="fas fa-camera"></i> 拍收據
                        <input type="file" id="item-photo" accept="image/*" class="hidden" onchange="previewImage(this)">
                    </label>
                    <button onclick="addRecord()" class="flex-1 bg-soft-pink text-white font-bold py-2 rounded-xl shadow-sm">新增</button>
                </div>
                <div id="photo-preview-container" class="hidden flex justify-center"><img id="photo-preview" src="" class="h-24 w-24 object-cover rounded-lg border-2 border-pink-100"></div>
            </div>
            <div id="record-list" class="space-y-3 pb-10"></div>
        </div>
    </script>

    <script id="tpl-lists" type="text/template">
        <div class="space-y-6 animate-fadeIn">
            <div class="bg-white p-5 rounded-xl-cute shadow-sm">
                <h3 class="font-cartoon text-lg mb-4 text-pink-400"><i class="fas fa-clipboard-list"></i> 行前檢查</h3>
                <div id="checklist-container" class="grid grid-cols-2 gap-3"></div>
            </div>
            <div class="bg-white p-5 rounded-xl-cute shadow-sm">
                <h3 class="font-cartoon text-lg mb-4 text-blue-400"><i class="fas fa-sticky-note"></i> 個人備忘錄</h3>
                <textarea id="memo-input" placeholder="隨手筆記或貼上連結..." class="w-full h-32 p-3 bg-blue-50/50 rounded-2xl border-none focus:ring-2 focus:ring-soft-blue outline-none text-sm"></textarea>
                <button onclick="saveMemo()" class="w-full mt-2 bg-soft-blue text-white font-bold py-2 rounded-xl">儲存備忘錄</button>
                <div id="memo-display" class="mt-4 space-y-2"></div>
            </div>
        </div>
    </script>

    <script id="tpl-info" type="text/template">
        <div class="space-y-4 animate-fadeIn">
            <div class="grid grid-cols-2 gap-4 text-center">
                <a href="https://www.jma.go.jp/bosai/forecast/#area_code=471000" target="_blank" class="bg-white p-4 rounded-xl-cute shadow-sm border border-orange-100">
                    <i class="fas fa-sun text-orange-400 text-2xl mb-2"></i><p class="text-xs font-bold">日本氣象廳</p>
                </a>
                <div class="bg-white p-4 rounded-xl-cute shadow-sm border border-red-100">
                    <i class="fas fa-phone-alt text-red-400 text-2xl mb-2"></i><p class="text-xs font-bold">緊急 110 / 119</p>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl-cute shadow-sm">
                <h3 class="font-bold text-red-500 mb-3"><i class="fas fa-exclamation-triangle"></i> 注意事項</h3>
                <ul class="text-xs space-y-3 text-gray-600 list-disc pl-4">
                    <li>🚫 禁帶肉製品回台（泡麵若含肉塊亦不可）。</li>
                    <li>🚙 左右駕相反，轉彎請默念「左小右大」。</li>
                    <li>💴 建議隨身攜帶 3-5 萬日幣現鈔，有些老店不收卡。</li>
                    <li>🔌 日本電壓 100V，台灣插頭可直接用。</li>
                </ul>
            </div>
        </div>
    </script>

    <script>
        const app = {
            currentTab: 'plan',
            db: JSON.parse(localStorage.getItem('tripData_v2')) || {
                records: [],
                memo: '',
                checkStatus: {}
            },
            photoTemp: null
        };

        function switchTab(tabId) {
            app.currentTab = tabId;
            const content = document.getElementById('app-content');
            const template = document.getElementById(`tpl-${tabId}`).innerHTML;
            content.innerHTML = template;

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-gray-400'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            document.getElementById(`btn-${tabId}`).classList.remove('text-gray-400');
            document.getElementById(`btn-${tabId}`).classList.add('nav-active');

            if(tabId === 'wallet') renderRecords();
            if(tabId === 'lists') { renderChecklist(); renderMemo(); }
            window.scrollTo(0, 0);
        }

        function calculateExchange() {
            const input = document.getElementById('calc-input').value;
            const rate = document.getElementById('exchange-rate').value;
            try {
                const sanitized = input.replace(/[^-+*/.0-9]/g, '');
                const jpy = new Function(`return ${sanitized}`)();
                document.getElementById('calc-result').innerText = `NT$ ${Math.round(jpy * rate).toLocaleString()}`;
            } catch (e) { alert('算式不正確喔！'); }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = 200 / img.width;
                        canvas.width = 200; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        app.photoTemp = canvas.toDataURL('image/jpeg', 0.6);
                        document.getElementById('photo-preview-container').classList.remove('hidden');
                        document.getElementById('photo-preview').src = app.photoTemp;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function addRecord() {
            const name = document.getElementById('item-name').value;
            const jpy = document.getElementById('item-jpy').value;
            const rate = document.getElementById('exchange-rate').value;
            if(!name || !jpy) return;
            app.db.records.unshift({ id: Date.now(), name, jpy, twd: Math.round(jpy * rate), photo: app.photoTemp });
            saveDB(); app.photoTemp = null; renderRecords();
            document.getElementById('item-name').value = ''; document.getElementById('item-jpy').value = '';
            document.getElementById('photo-preview-container').classList.add('hidden');
        }

        function renderRecords() {
            const list = document.getElementById('record-list');
            if(!list) return;
            list.innerHTML = app.db.records.map(r => `
                <div class="flex items-center bg-white p-3 rounded-2xl shadow-sm border border-pink-50 space-x-3">
                    ${r.photo ? `<img src="${r.photo}" class="w-12 h-12 rounded-lg object-cover shadow-sm">` : `<div class="w-12 h-12 bg-pink-50 rounded-lg flex items-center justify-center text-pink-200 text-xs">NO IMG</div>`}
                    <div class="flex-1">
                        <p class="font-bold text-sm text-gray-700">${r.name}</p>
                        <p class="text-[10px] text-gray-400">¥${r.jpy} → NT$${r.twd}</p>
                    </div>
                    <button onclick="deleteRecord(${r.id})" class="text-gray-300 pr-2"><i class="fas fa-times-circle"></i></button>
                </div>
            `).join('');
        }

        function deleteRecord(id) {
            app.db.records = app.db.records.filter(r => r.id !== id);
            saveDB(); renderRecords();
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            const items = ['護照', '網卡/Wi-Fi', '日文譯本', '台灣駕照', '日幣現鈔', '信用卡', '換洗衣物', '行動電源'];
            container.innerHTML = items.map(item => `
                <label class="flex items-center space-x-2 text-sm bg-pink-50/50 p-2 rounded-xl cursor-pointer">
                    <input type="checkbox" onchange="toggleCheck('${item}')" ${app.db.checkStatus[item] ? 'checked' : ''} class="accent-pink-400 h-4 w-4">
                    <span class="${app.db.checkStatus[item] ? 'line-through text-gray-400' : 'text-gray-600'}">${item}</span>
                </label>
            `).join('');
        }

        function toggleCheck(item) {
            app.db.checkStatus[item] = !app.db.checkStatus[item];
            saveDB(); renderChecklist();
        }

        function saveMemo() {
            app.db.memo = document.getElementById('memo-input').value;
            saveDB(); renderMemo();
        }

        function renderMemo() {
            const display = document.getElementById('memo-display');
            const input = document.getElementById('memo-input');
            if(input) input.value = app.db.memo;
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const content = app.db.memo.replace(urlRegex, (url) => `<a href="${url}" target="_blank" class="inline-block bg-soft-blue text-white px-3 py-1 rounded-full text-[10px] m-1"><i class="fas fa-external-link-alt"></i> 點我開啟</a>`);
            display.innerHTML = `<div class="text-sm whitespace-pre-wrap text-gray-600 p-2">${content}</div>`;
        }

        function saveDB() { localStorage.setItem('tripData_v2', JSON.stringify(app.db)); }

        window.onload = () => switchTab('plan');
    </script>
</body>
</html>
